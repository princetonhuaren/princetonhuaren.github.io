<!DOCTYPE html>
<html lang="zh">
<head>
<meta charset="UTF-8">
<title>Logo 预览</title>
<style>
  body { background: #f5f5f5; font-family: sans-serif; padding: 40px; }
  .grid { display: flex; flex-wrap: wrap; gap: 40px; }
  .card { background: white; border-radius: 12px; padding: 32px; box-shadow: 0 2px 12px rgba(0,0,0,0.08); display: flex; flex-direction: column; align-items: center; gap: 16px; min-width: 220px; }
  .card h3 { margin: 0; color: #666; font-size: 13px; }
  .dark { background: #1a1a2e; }
  .dark h3 { color: #aaa; }
</style>
</head>
<body>
<h2>普林华人网站 Logo 方案</h2>
<div class="grid">

  <!-- Option 1: 圆形徽章 -->
  <div class="card">
    <h3>方案一：圆形徽章</h3>
    <svg width="160" height="160" viewBox="0 0 160 160" xmlns="http://www.w3.org/2000/svg">
      <circle cx="80" cy="80" r="76" fill="#FF6600"/>
      <circle cx="80" cy="80" r="70" fill="none" stroke="white" stroke-width="2" opacity="0.4"/>
      <text x="80" y="76" font-family="serif" font-size="42" font-weight="bold" fill="white" text-anchor="middle" dominant-baseline="middle">普</text>
      <text x="80" y="108" font-family="sans-serif" font-size="13" fill="white" text-anchor="middle" letter-spacing="3">PRINCETON</text>
      <text x="80" y="126" font-family="sans-serif" font-size="11" fill="rgba(255,255,255,0.8)" text-anchor="middle" letter-spacing="2">华 人 社 区</text>
    </svg>
    <svg width="200" height="44" viewBox="0 0 200 44" xmlns="http://www.w3.org/2000/svg">
      <circle cx="22" cy="22" r="22" fill="#FF6600"/>
      <text x="22" y="22" font-family="serif" font-size="18" font-weight="bold" fill="white" text-anchor="middle" dominant-baseline="middle">普</text>
      <text x="54" y="18" font-family="sans-serif" font-size="16" font-weight="700" fill="#222">普林华人</text>
      <text x="54" y="36" font-family="sans-serif" font-size="11" fill="#888" letter-spacing="1">Princeton Chinese Community</text>
    </svg>
  </div>

  <!-- Option 2: 老虎爪 -->
  <div class="card">
    <h3>方案二：老虎 + 文字</h3>
    <svg width="160" height="160" viewBox="0 0 160 160" xmlns="http://www.w3.org/2000/svg">
      <rect width="160" height="160" rx="16" fill="#FF6600"/>
      <!-- Tiger face simplified -->
      <ellipse cx="80" cy="78" rx="42" ry="38" fill="#FFD580"/>
      <!-- ears -->
      <polygon points="40,48 52,70 28,70" fill="#FF6600"/>
      <polygon points="120,48 108,70 132,70" fill="#FF6600"/>
      <polygon points="42,52 52,68 34,68" fill="#FFD580"/>
      <polygon points="118,52 108,68 126,68" fill="#FFD580"/>
      <!-- eyes -->
      <ellipse cx="65" cy="75" rx="8" ry="9" fill="white"/>
      <ellipse cx="95" cy="75" rx="8" ry="9" fill="white"/>
      <ellipse cx="65" cy="76" rx="4" ry="5" fill="#1a1a1a"/>
      <ellipse cx="95" cy="76" rx="4" ry="5" fill="#1a1a1a"/>
      <circle cx="67" cy="74" r="1.5" fill="white"/>
      <circle cx="97" cy="74" r="1.5" fill="white"/>
      <!-- nose -->
      <ellipse cx="80" cy="90" rx="5" ry="3.5" fill="#FF6600"/>
      <!-- mouth -->
      <path d="M75,93 Q80,98 85,93" stroke="#FF6600" stroke-width="1.5" fill="none"/>
      <!-- stripes -->
      <path d="M50,62 Q55,58 54,52" stroke="#CC5500" stroke-width="2.5" fill="none" opacity="0.6"/>
      <path d="M58,58 Q61,53 60,47" stroke="#CC5500" stroke-width="2" fill="none" opacity="0.6"/>
      <path d="M110,62 Q105,58 106,52" stroke="#CC5500" stroke-width="2.5" fill="none" opacity="0.6"/>
      <path d="M102,58 Q99,53 100,47" stroke="#CC5500" stroke-width="2" fill="none" opacity="0.6"/>
      <text x="80" y="132" font-family="sans-serif" font-size="14" font-weight="700" fill="white" text-anchor="middle" letter-spacing="2">普林华人</text>
    </svg>
  </div>

  <!-- Option 3: 地图 Pin -->
  <div class="card">
    <h3>方案三：地图 Pin</h3>
    <svg width="120" height="160" viewBox="0 0 120 160" xmlns="http://www.w3.org/2000/svg">
      <defs>
        <linearGradient id="pinGrad" x1="0%" y1="0%" x2="100%" y2="100%">
          <stop offset="0%" style="stop-color:#FF8C00"/>
          <stop offset="100%" style="stop-color:#FF4400"/>
        </linearGradient>
      </defs>
      <path d="M60,8 C33,8 12,29 12,56 C12,85 60,142 60,142 C60,142 108,85 108,56 C108,29 87,8 60,8 Z" fill="url(#pinGrad)"/>
      <circle cx="60" cy="56" r="28" fill="white" opacity="0.15"/>
      <text x="60" y="50" font-family="serif" font-size="26" font-weight="bold" fill="white" text-anchor="middle" dominant-baseline="middle">普</text>
      <text x="60" y="72" font-family="sans-serif" font-size="9" fill="rgba(255,255,255,0.9)" text-anchor="middle" letter-spacing="1">华人</text>
    </svg>
    <svg width="200" height="44" viewBox="0 0 200 44" xmlns="http://www.w3.org/2000/svg">
      <defs>
        <linearGradient id="pinGrad2" x1="0%" y1="0%" x2="100%" y2="100%">
          <stop offset="0%" style="stop-color:#FF8C00"/>
          <stop offset="100%" style="stop-color:#FF4400"/>
        </linearGradient>
      </defs>
      <path d="M22,2 C11,2 2,11 2,22 C2,34 22,44 22,44 C22,44 42,34 42,22 C42,11 33,2 22,2 Z" fill="url(#pinGrad2)"/>
      <text x="22" y="20" font-family="serif" font-size="14" font-weight="bold" fill="white" text-anchor="middle" dominant-baseline="middle">普</text>
      <text x="58" y="18" font-family="sans-serif" font-size="16" font-weight="700" fill="#222">普林华人</text>
      <text x="58" y="36" font-family="sans-serif" font-size="11" fill="#888">Princeton Chinese Community</text>
    </svg>
  </div>

  <!-- Option 4: 极简文字 -->
  <div class="card">
    <h3>方案四：极简文字</h3>
    <svg width="200" height="80" viewBox="0 0 200 80" xmlns="http://www.w3.org/2000/svg">
      <text x="10" y="52" font-family="serif" font-size="48" font-weight="900" fill="#FF6600">普林</text>
      <text x="108" y="52" font-family="serif" font-size="48" font-weight="300" fill="#222">华人</text>
      <rect x="10" y="60" width="180" height="2.5" fill="#FF6600" rx="1"/>
      <text x="12" y="76" font-family="sans-serif" font-size="11" fill="#999" letter-spacing="3">PRINCETON CHINESE COMMUNITY</text>
    </svg>
  </div>

  <!-- Option 5: P + 华 组合 -->
  <div class="card">
    <h3>方案五：P华 双字标</h3>
    <svg width="160" height="160" viewBox="0 0 160 160" xmlns="http://www.w3.org/2000/svg">
      <rect width="160" height="160" rx="20" fill="#1a1a2e"/>
      <!-- P letter -->
      <text x="22" y="105" font-family="Georgia, serif" font-size="90" font-weight="900" fill="#FF6600" opacity="0.9">P</text>
      <!-- 华 overlapping -->
      <text x="68" y="108" font-family="serif" font-size="72" font-weight="700" fill="white">华</text>
    </svg>
    <svg width="200" height="44" viewBox="0 0 200 44" xmlns="http://www.w3.org/2000/svg">
      <rect width="44" height="44" rx="8" fill="#1a1a2e"/>
      <text x="4" y="38" font-family="Georgia, serif" font-size="38" font-weight="900" fill="#FF6600">P</text>
      <text x="22" y="40" font-family="serif" font-size="30" font-weight="700" fill="white">华</text>
      <text x="56" y="18" font-family="sans-serif" font-size="16" font-weight="700" fill="#222">普林华人</text>
      <text x="56" y="36" font-family="sans-serif" font-size="11" fill="#888">Princeton Chinese Community</text>
    </svg>
  </div>

  <!-- Dark background preview -->
  <div class="card dark">
    <h3>深色背景效果（方案五）</h3>
    <svg width="200" height="44" viewBox="0 0 200 44" xmlns="http://www.w3.org/2000/svg">
      <rect width="44" height="44" rx="8" fill="#FF6600"/>
      <text x="4" y="38" font-family="Georgia, serif" font-size="38" font-weight="900" fill="#1a1a2e">P</text>
      <text x="22" y="40" font-family="serif" font-size="30" font-weight="700" fill="white">华</text>
      <text x="56" y="18" font-family="sans-serif" font-size="16" font-weight="700" fill="white">普林华人</text>
      <text x="56" y="36" font-family="sans-serif" font-size="11" fill="rgba(255,255,255,0.6)">Princeton Chinese Community</text>
    </svg>
  </div>

</div>
</body>
</html>
