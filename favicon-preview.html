<!DOCTYPE html>
<html lang="zh">
<head>
<meta charset="UTF-8">
<title>Favicon 预览</title>
<style>
  body { background: #f0ede8; font-family: sans-serif; padding: 40px; }
  .grid { display: flex; flex-wrap: wrap; gap: 32px; align-items: flex-start; }
  .card { background: white; border-radius: 12px; padding: 24px; box-shadow: 0 2px 12px rgba(0,0,0,0.08); display: flex; flex-direction: column; align-items: center; gap: 16px; min-width: 160px; }
  .card h3 { margin: 0; color: #888; font-size: 11px; letter-spacing: 1px; text-transform: uppercase; }
  .sizes { display: flex; align-items: flex-end; gap: 12px; }
  .tab-mock { display: flex; align-items: center; gap: 6px; background: #e8e8e8; padding: 6px 16px 6px 10px; border-radius: 8px 8px 0 0; font-size: 13px; color: #444; margin-top: 8px; border-bottom: 2px solid white; }
</style>
</head>
<body>
<h2 style="color:#333;margin-bottom:8px">Favicon 方案（浏览器标签页图标）</h2>
<p style="color:#888;margin-bottom:32px;font-size:13px">实际显示约 16–32px，设计要极简</p>
<div class="grid">

  <!-- F1: 橙底白"普" -->
  <div class="card">
    <h3>F1 · 橙底白「普」</h3>
    <div class="sizes">
      <svg width="64" height="64" viewBox="0 0 64 64" xmlns="http://www.w3.org/2000/svg">
        <rect width="64" height="64" rx="14" fill="#FF6600"/>
        <text x="32" y="46" font-family="serif" font-size="38" font-weight="900" fill="white" text-anchor="middle">普</text>
      </svg>
      <svg width="32" height="32" viewBox="0 0 64 64" xmlns="http://www.w3.org/2000/svg">
        <rect width="64" height="64" rx="14" fill="#FF6600"/>
        <text x="32" y="46" font-family="serif" font-size="38" font-weight="900" fill="white" text-anchor="middle">普</text>
      </svg>
      <svg width="16" height="16" viewBox="0 0 64 64" xmlns="http://www.w3.org/2000/svg">
        <rect width="64" height="64" rx="14" fill="#FF6600"/>
        <text x="32" y="46" font-family="serif" font-size="38" font-weight="900" fill="white" text-anchor="middle">普</text>
      </svg>
    </div>
    <div class="tab-mock">
      <svg width="16" height="16" viewBox="0 0 64 64"><rect width="64" height="64" rx="14" fill="#FF6600"/><text x="32" y="46" font-family="serif" font-size="38" font-weight="900" fill="white" text-anchor="middle">普</text></svg>
      Princeton 华人
    </div>
  </div>

  <!-- F2: 深底橙"普" -->
  <div class="card">
    <h3>F2 · 深底橙「普」</h3>
    <div class="sizes">
      <svg width="64" height="64" viewBox="0 0 64 64" xmlns="http://www.w3.org/2000/svg">
        <rect width="64" height="64" rx="14" fill="#1a1a2e"/>
        <text x="32" y="46" font-family="serif" font-size="38" font-weight="900" fill="#FF6600" text-anchor="middle">普</text>
      </svg>
      <svg width="32" height="32" viewBox="0 0 64 64" xmlns="http://www.w3.org/2000/svg">
        <rect width="64" height="64" rx="14" fill="#1a1a2e"/>
        <text x="32" y="46" font-family="serif" font-size="38" font-weight="900" fill="#FF6600" text-anchor="middle">普</text>
      </svg>
      <svg width="16" height="16" viewBox="0 0 64 64" xmlns="http://www.w3.org/2000/svg">
        <rect width="64" height="64" rx="14" fill="#1a1a2e"/>
        <text x="32" y="46" font-family="serif" font-size="38" font-weight="900" fill="#FF6600" text-anchor="middle">普</text>
      </svg>
    </div>
    <div class="tab-mock">
      <svg width="16" height="16" viewBox="0 0 64 64"><rect width="64" height="64" rx="14" fill="#1a1a2e"/><text x="32" y="46" font-family="serif" font-size="38" font-weight="900" fill="#FF6600" text-anchor="middle">普</text></svg>
      Princeton 华人
    </div>
  </div>

  <!-- F3: 橙底白"华" -->
  <div class="card">
    <h3>F3 · 橙底白「华」</h3>
    <div class="sizes">
      <svg width="64" height="64" viewBox="0 0 64 64" xmlns="http://www.w3.org/2000/svg">
        <rect width="64" height="64" rx="14" fill="#FF6600"/>
        <text x="32" y="47" font-family="serif" font-size="36" font-weight="900" fill="white" text-anchor="middle">华</text>
      </svg>
      <svg width="32" height="32" viewBox="0 0 64 64" xmlns="http://www.w3.org/2000/svg">
        <rect width="64" height="64" rx="14" fill="#FF6600"/>
        <text x="32" y="47" font-family="serif" font-size="36" font-weight="900" fill="white" text-anchor="middle">华</text>
      </svg>
      <svg width="16" height="16" viewBox="0 0 64 64" xmlns="http://www.w3.org/2000/svg">
        <rect width="64" height="64" rx="14" fill="#FF6600"/>
        <text x="32" y="47" font-family="serif" font-size="36" font-weight="900" fill="white" text-anchor="middle">华</text>
      </svg>
    </div>
    <div class="tab-mock">
      <svg width="16" height="16" viewBox="0 0 64 64"><rect width="64" height="64" rx="14" fill="#FF6600"/><text x="32" y="47" font-family="serif" font-size="36" font-weight="900" fill="white" text-anchor="middle">华</text></svg>
      Princeton 华人
    </div>
  </div>

  <!-- F4: 圆形橙底白"普" -->
  <div class="card">
    <h3>F4 · 圆形橙底</h3>
    <div class="sizes">
      <svg width="64" height="64" viewBox="0 0 64 64" xmlns="http://www.w3.org/2000/svg">
        <circle cx="32" cy="32" r="32" fill="#FF6600"/>
        <text x="32" y="46" font-family="serif" font-size="36" font-weight="900" fill="white" text-anchor="middle">普</text>
      </svg>
      <svg width="32" height="32" viewBox="0 0 64 64" xmlns="http://www.w3.org/2000/svg">
        <circle cx="32" cy="32" r="32" fill="#FF6600"/>
        <text x="32" y="46" font-family="serif" font-size="36" font-weight="900" fill="white" text-anchor="middle">普</text>
      </svg>
      <svg width="16" height="16" viewBox="0 0 64 64" xmlns="http://www.w3.org/2000/svg">
        <circle cx="32" cy="32" r="32" fill="#FF6600"/>
        <text x="32" y="46" font-family="serif" font-size="36" font-weight="900" fill="white" text-anchor="middle">普</text>
      </svg>
    </div>
    <div class="tab-mock">
      <svg width="16" height="16" viewBox="0 0 64 64"><circle cx="32" cy="32" r="32" fill="#FF6600"/><text x="32" y="46" font-family="serif" font-size="36" font-weight="900" fill="white" text-anchor="middle">普</text></svg>
      Princeton 华人
    </div>
  </div>

  <!-- F5: P + 华 叠字 -->
  <div class="card">
    <h3>F5 · P华 叠字</h3>
    <div class="sizes">
      <svg width="64" height="64" viewBox="0 0 64 64" xmlns="http://www.w3.org/2000/svg">
        <rect width="64" height="64" rx="14" fill="#1a1a2e"/>
        <text x="6" y="54" font-family="Georgia,serif" font-size="52" font-weight="900" fill="#FF6600" opacity="0.9">P</text>
        <text x="28" y="56" font-family="serif" font-size="38" font-weight="700" fill="white">华</text>
      </svg>
      <svg width="32" height="32" viewBox="0 0 64 64" xmlns="http://www.w3.org/2000/svg">
        <rect width="64" height="64" rx="14" fill="#1a1a2e"/>
        <text x="6" y="54" font-family="Georgia,serif" font-size="52" font-weight="900" fill="#FF6600" opacity="0.9">P</text>
        <text x="28" y="56" font-family="serif" font-size="38" font-weight="700" fill="white">华</text>
      </svg>
      <svg width="16" height="16" viewBox="0 0 64 64" xmlns="http://www.w3.org/2000/svg">
        <rect width="64" height="64" rx="14" fill="#1a1a2e"/>
        <text x="6" y="54" font-family="Georgia,serif" font-size="52" font-weight="900" fill="#FF6600" opacity="0.9">P</text>
        <text x="28" y="56" font-family="serif" font-size="38" font-weight="700" fill="white">华</text>
      </svg>
    </div>
    <div class="tab-mock">
      <svg width="16" height="16" viewBox="0 0 64 64"><rect width="64" height="64" rx="14" fill="#1a1a2e"/><text x="6" y="54" font-family="Georgia,serif" font-size="52" font-weight="900" fill="#FF6600" opacity="0.9">P</text><text x="28" y="56" font-family="serif" font-size="38" font-weight="700" fill="white">华</text></svg>
      Princeton 华人
    </div>
  </div>

  <!-- F6: 橙白普华两字小方块 -->
  <div class="card">
    <h3>F6 · 普华两格</h3>
    <div class="sizes">
      <svg width="64" height="64" viewBox="0 0 64 64" xmlns="http://www.w3.org/2000/svg">
        <rect width="30" height="64" rx="10" fill="#FF6600"/>
        <rect x="34" width="30" height="64" rx="10" fill="#1a1a2e"/>
        <text x="15" y="44" font-family="serif" font-size="28" font-weight="900" fill="white" text-anchor="middle">普</text>
        <text x="49" y="44" font-family="serif" font-size="28" font-weight="900" fill="#FF6600" text-anchor="middle">华</text>
      </svg>
      <svg width="32" height="32" viewBox="0 0 64 64" xmlns="http://www.w3.org/2000/svg">
        <rect width="30" height="64" rx="10" fill="#FF6600"/>
        <rect x="34" width="30" height="64" rx="10" fill="#1a1a2e"/>
        <text x="15" y="44" font-family="serif" font-size="28" font-weight="900" fill="white" text-anchor="middle">普</text>
        <text x="49" y="44" font-family="serif" font-size="28" font-weight="900" fill="#FF6600" text-anchor="middle">华</text>
      </svg>
      <svg width="16" height="16" viewBox="0 0 64 64" xmlns="http://www.w3.org/2000/svg">
        <rect width="30" height="64" rx="10" fill="#FF6600"/>
        <rect x="34" width="30" height="64" rx="10" fill="#1a1a2e"/>
        <text x="15" y="44" font-family="serif" font-size="28" font-weight="900" fill="white" text-anchor="middle">普</text>
        <text x="49" y="44" font-family="serif" font-size="28" font-weight="900" fill="#FF6600" text-anchor="middle">华</text>
      </svg>
    </div>
    <div class="tab-mock">
      <svg width="16" height="16" viewBox="0 0 64 64"><rect width="30" height="64" rx="10" fill="#FF6600"/><rect x="34" width="30" height="64" rx="10" fill="#1a1a2e"/><text x="15" y="44" font-family="serif" font-size="28" font-weight="900" fill="white" text-anchor="middle">普</text><text x="49" y="44" font-family="serif" font-size="28" font-weight="900" fill="#FF6600" text-anchor="middle">华</text></svg>
      Princeton 华人
    </div>
  </div>

</div>
<p style="margin-top:32px;color:#aaa;font-size:12px">每个方案从左到右：64px / 32px / 16px 实际大小；下方模拟浏览器标签页效果</p>
</body>
</html>
