<!DOCTYPE html>
<html>
<head>
  <meta charset="utf-8">
  <title>Princeton 华人</title>
  <script>
    // GitHub Pages SPA redirect trick
    // Encodes the path as a query param and redirects to index.html
    var l = window.location;
    l.replace(
      l.protocol + '//' + l.hostname + (l.port ? ':' + l.port : '') +
      '/?p=' + encodeURIComponent(l.pathname + l.search) + l.hash
    );
  </script>
</head>
<body></body>
</html>
